# ─────────────────────────────────────────────────────────────────────────────
# Despliegue automático en GitHub Pages.
# Cada vez que haces "push" a la rama main, este flujo construye la app y la
# publica. (La primera vez debes activar Pages en el repo: Settings → Pages →
# Source: "GitHub Actions".)
# ─────────────────────────────────────────────────────────────────────────────
name: Desplegar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Permite lanzarlo a mano desde la pestaña Actions.

# Permisos que necesita el despliegue a Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Si llegan varios push seguidos, cancela el despliegue anterior en curso.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Construir
        run: pnpm build

      # GitHub Pages no conoce las rutas internas de la app (es una SPA). Copiando
      # index.html como 404.html, cualquier enlace directo carga la app igualmente.
      - name: Preparar 404 para rutas internas (SPA)
        run: cp dist/index.html dist/404.html

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
